<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Rendition B: Warm — cream "ai" on coral-to-green gradient, bold checkmark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D5016"/>
      <stop offset="100%" stop-color="#1A3A0A"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="40" y="40" width="944" height="944" rx="200" fill="none" stroke="#F8F5F0" stroke-width="2" opacity="0.08"/>

  <!-- Letter "a" — rounded sans style -->
  <text x="260" y="700" font-family="'SF Pro Rounded', 'Avenir Next', Avenir, sans-serif" font-size="500" font-weight="600" fill="#F8F5F0" letter-spacing="0">a</text>

  <!-- Letter "i" — rounded sans style, no dot -->
  <text x="560" y="700" font-family="'SF Pro Rounded', 'Avenir Next', Avenir, sans-serif" font-size="500" font-weight="600" fill="#F8F5F0" letter-spacing="0">i</text>

  <!-- Cover the original dot of "i" -->
  <rect x="590" y="280" width="100" height="80" fill="#2D5016"/>

  <!-- Checkmark replacing the dot — larger and bolder -->
  <g fill="none" stroke="#E8C547" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="612,332 636,358 680,300"/>
  </g>

  <!-- Gold accent line at bottom -->
  <rect x="280" y="760" width="464" height="4" rx="2" fill="#E8C547" opacity="0.4"/>
</svg>